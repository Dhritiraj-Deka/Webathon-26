<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SILONI - Guwahati Zones</title>
  <link rel="stylesheet" href="styles.css"> <!-- external CSS -->
</head>
<body>
  <header>
    <h1>SILONI</h1>
    <p>Click a zone in Guwahati to view tasks</p>
  </header>

  <div class="main">
    <div class="zones">
      <button class="zone" onclick="showTasks('zone1')">Zone 1</button>
      <button class="zone" onclick="showTasks('zone2')">Zone 2</button>
      <button class="zone" onclick="showTasks('zone3')">Zone 3</button>
      <button class="zone" onclick="showTasks('zone4')">Zone 4</button>
    </div>
    <div class="tasks" id="taskList">
      <p>Select a zone to see tasks.</p>
    </div>
  </div>

  <script src="script.js"></script> <!-- external JS -->
</body>
</html>
