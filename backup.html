<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SILONI - Backup</title>
  <!-- Link to external CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>SILONI</h1>
    <p>Click a zone in Guwahati to view tasks</p>
  </header>

  <div class="main">
    <div class="zones">
      <button class="zone" onclick="showTasks('Maligaon')">Maligaon</button>
      <button class="zone" onclick="showTasks('Dispur')">Dispur</button>
      <button class="zone" onclick="showTasks('Beltola')">Beltola</button>
      <button class="zone" onclick="showTasks('Pan Bazaar')">Pan Bazaar</button>
      <button class="zone" onclick="showTasks('Zoo Road')">Zoo Road</button>
      <button class="zone" onclick="showTasks('Paltan Bazaar')">Paltan Bazaar</button>
    </div>
    <div class="tasks" id="taskList">
      <p>Select a zone to see tasks.</p>
    </div>
  </div>

  <script>
    // Generate 12 tasks per zone with random remote/onsite assignment
    const sampleTasks = [];
    const zones = ["Maligaon","Dispur","Beltola","Pan Bazaar","Zoo Road","Paltan Bazaar"];
    zones.forEach(zone => {
      for (let i = 1; i <= 12; i++) {
        const type = Math.random() < 0.5 ? "remote" : "onsite";
        sampleTasks.push({
          title: `Task ${i} in ${zone}`,
          description: `Description for task ${i} located in ${zone}.`,
          budget: Math.floor(Math.random() * 200) + 20,
          deadline: `2026-04-${(i<10?"0":"")+i}`,
          zone: zone,
          type: type
        });
      }
    });

    function showTasks(zoneName) {
      const taskList = document.getElementById('taskList');
      const tasks = sampleTasks.filter(task => task.zone === zoneName);

      if (tasks.length === 0) {
        taskList.innerHTML = "<p>No tasks available in this area.</p>";
        return;
      }

      taskList.innerHTML = "";
      tasks.forEach(task => {
        const card = document.createElement('div');
        card.className = 'task-card';
        const titleClass = task.type === "remote" ? "remote-title" : "onsite-title";
        card.innerHTML = `
          <h3 class="${titleClass}">${task.title}</h3>
          <p>${task.description}</p>
          <p><strong>Budget:</strong> ${task.budget}</p>
          <p><strong>Deadline:</strong> ${task.deadline}</p>
          <p><strong>Location:</strong> ${task.zone}</p>
          <p><strong>Type:</strong> ${task.type}</p>
        `;
        taskList.appendChild(card);
      });
    }
  </script>
</body>
</html>
