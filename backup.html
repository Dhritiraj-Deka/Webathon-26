<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SILONI - Backup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
    }
    header {
      background: #1f1f1f;
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    header h1 {
      font-size: 3rem;
      font-style: italic;
      color: #ffffff;
      margin: 0;
    }
    header p {
      color: #aaa;
      margin-top: 0.5rem;
    }
    .main {
      display: flex;
      min-height: calc(100vh - 120px);
    }
    .zones {
      width: 220px;
      background: #1a1a1a;
      padding: 1rem;
      border-right: 1px solid #333;
    }
    .zone {
      display: block;
      margin: 0.5rem 0;
      padding: 0.7rem;
      width: 100%;
      background: #2a2a2a;
      color: #e0e0e0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .zone:hover {
      background: #333;
    }
    .tasks {
      flex: 1;
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-gap: 1.5rem;
    }
    .task-card {
      background: #1f1f1f;
      border: 1px solid #333;
      padding: 1rem;
      border-radius: 6px;
      height: 220px;
      overflow: hidden;
    }
    .task-card h3 {
      margin-top: 0;
      text-shadow: 0 0 8px currentColor;
    }
    .remote-title {
      color: #00ff00; /* glowing green */
    }
    .onsite-title {
      color: #00aaff; /* glowing blue */
    }
    .task-card p {
      margin: 0.3rem 0;
      color: #ccc;
    }
  </style>
</head>
<body>
  <header>
    <h1>SILONI</h1>
    <p>Click a zone in Guwahati to view tasks</p>
  </header>

  <div class="main">
    <div class="zones">
      <button class="zone" onclick="showTasks('Maligaon')">Maligaon</button>
      <button class="zone" onclick="showTasks('Dispur')">Dispur</button>
      <button class="zone" onclick="showTasks('Beltola')">Beltola</button>
      <button class="zone" onclick="showTasks('Pan Bazaar')">Pan Bazaar</button>
      <button class="zone" onclick="showTasks('Zoo Road')">Zoo Road</button>
      <button class="zone" onclick="showTasks('Paltan Bazaar')">Paltan Bazaar</button>
    </div>
    <div class="tasks" id="taskList">
      <p>Select a zone to see tasks.</p>
    </div>
  </div>

  <script>
    // Generate 12 tasks per zone with random remote/onsite assignment
    const sampleTasks = [];
    const zones = ["Maligaon","Dispur","Beltola","Pan Bazaar","Zoo Road","Paltan Bazaar"];
    zones.forEach(zone => {
      for (let i = 1; i <= 12; i++) {
        const type = Math.random() < 0.5 ? "remote" : "onsite";
        sampleTasks.push({
          title: `Task ${i} in ${zone}`,
          description: `Description for task ${i} located in ${zone}.`,
          budget: Math.floor(Math.random() * 200) + 20,
          deadline: `2026-04-${(i<10?"0":"")+i}`,
          zone: zone,
          type: type
        });
      }
    });

    function showTasks(zoneName) {
      const taskList = document.getElementById('taskList');
      const tasks = sampleTasks.filter(task => task.zone === zoneName);

      if (tasks.length === 0) {
        taskList.innerHTML = "<p>No tasks available in this area.</p>";
        return;
      }

      taskList.innerHTML = "";
      tasks.forEach(task => {
        const card = document.createElement('div');
        card.className = 'task-card';
        const titleClass = task.type === "remote" ? "remote-title" : "onsite-title";
        card.innerHTML = `
          <h3 class="${titleClass}">${task.title}</h3>
          <p>${task.description}</p>
          <p><strong>Budget:</strong> ${task.budget}</p>
          <p><strong>Deadline:</strong> ${task.deadline}</p>
          <p><strong>Location:</strong> ${task.zone}</p>
          <p><strong>Type:</strong> ${task.type}</p>
        `;
        taskList.appendChild(card);
      });
    }
  </script>
</body>
</html>
