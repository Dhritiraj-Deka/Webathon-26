<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SILONI - Login</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: #1e1e1e;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.7);
      width: 350px;
      text-align: center;
    }
    .login-box h2 {
      margin-bottom: 20px;
      color: #4CAF50;
      font-style: italic;
      font-size: 2em;
      text-shadow: 0 0 6px rgba(76,175,80,0.6);
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 4px;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 1em;
    }
    .login-box input:focus {
      outline: 2px solid #4CAF50;
    }
    .btn {
      background: #4CAF50;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 1em;
      margin-top: 15px;
    }
    .btn:hover {
      background: #45a049;
    }
    .extra-links {
      margin-top: 15px;
      font-size: 0.9em;
      color: #aaa;
    }
    .extra-links a {
      color: #4CAF50;
      text-decoration: none;
    }
    .extra-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>SILONI Login</h2>
    <form>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="extra-links">
      <p>Don't have an account? <a href="#">Sign up</a></p>
      <p><a href="#">Forgot password?</a></p>
    </div>
  </div>
</body>
</html>
